name: Musleem
description: "Muslim Prayer Reminder"
publish_to: 'none' # Remove this line if you wish to publish to pub.dev
version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  http: ^1.1.0
  intl: ^0.18.1
  shared_preferences: ^2.5.4
  supabase_flutter: ^2.1.0
  url_launcher: ^6.1.10
  google_fonts: ^6.2.1
  hijri: ^3.0.0
  smooth_page_indicator: ^1.2.0-nullsafety.1
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_compass: ^0.8.0
  geolocator: ^13.0.2
  permission_handler: ^11.3.1
  geocoding: ^3.0.0
  vibration: ^2.0.0
  # flutter_foreground_task: ^9.2.2
  flutter_local_notifications: ^18.0.0
  timezone: ^0.10.0
  flutter_launcher_icons: ^0.13.1
  image_picker: ^1.2.2
  audioplayers: ^6.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/audio/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/icon.png"

  # 🔥 penting
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "assets/images/icon_foreground.png"